{% extends "base.html" %}

{% block title %}Connexion Admin | EllesAid{% endblock %}
{% block header_title %}Connexion administrateur{% endblock %}

{% block content %}

<div style="max-width: 500px; margin: 40px auto;">
    <div class="card" style="padding: 35px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #6B4E71; margin-bottom: 10px;">EllesAid Admin</h2>
            <p style="color: #777; margin: 0;">
                Connectez-vous pour accéder au tableau de bord administrateur.
            </p>
        </div>

        <form action="/admin/login" method="POST">

            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="Entrez votre nom d'utilisateur"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Entrez votre mot de passe"
                    required
                >
            </div>

            <div style="margin-top: 25px;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Se connecter
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
